name: Medifull Full-Stack Deploy

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build Backend
        run: |
          cd backend
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Build Frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
          NEXT_PUBLIC_KAKAO_APP_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_APP_KEY }}
          NEXT_PUBLIC_KAKAO_API_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_API_KEY }}
          NEXT_PUBLIC_IMAGE_BASE_URL: ${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_PORT_URL: ${{ secrets.NEXT_PUBLIC_API_PORT_URL }}
        run: |
          cd nextFront
          NEXT_PUBLIC_KAKAO_API_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_API_KEY }} \
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
          NEXT_PUBLIC_IMAGE_BASE_URL=${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }} \
          NEXT_PUBLIC_API_PORT_URL=${{ secrets.NEXT_PUBLIC_API_PORT_URL }} \
          npm install
          npm run build

      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "./*"
          target: "/home/ubuntu/app"

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 40m
          script: |
            cd ~/app

            echo "NEXT_PUBLIC_KAKAO_API_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_API_KEY }}" > .env
            echo "NEXT_PUBLIC_KAKAO_APP_KEY=${{ secrets.KAKAO_APP_KEY }}" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "NEXT_PUBLIC_API_PORT_URL=${{ secrets.NEXT_PUBLIC_API_PORT_URL }}" >> .env
            echo "NEXT_PUBLIC_IMAGE_BASE_URL=${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}" >> .env
            echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}" >> .env
            echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}" >> .env
            echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> .env
            echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> .env
            echo "OCI_NAMESPACE=${{ secrets.OCI_NAMESPACE }}" >> .env

            export OCI_PRIVATE_KEY="${{ secrets.OCI_PRIVATE_KEY }}"

            sudo docker-compose down || true
            sudo docker system prune -af || true


            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }} \
            DB_DATABASE=${{ secrets.DB_DATABASE }} \
            DB_USERNAME=${{ secrets.DB_USERNAME }} \
            DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            sudo -E docker-compose up -d --build

            DB_ROOT_PASSWORD='${{ secrets.DB_ROOT_PASSWORD }}' \
            DB_DATABASE='${{ secrets.DB_DATABASE }}' \
            DB_USERNAME='${{ secrets.DB_USERNAME }}' \
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            OCI_PRIVATE_KEY="${{ secrets.OCI_PRIVATE_KEY }}" \
            sudo -E docker-compose build next-frontend


            DB_ROOT_PASSWORD='${{ secrets.DB_ROOT_PASSWORD }}' \
            DB_DATABASE='${{ secrets.DB_DATABASE }}' \
            DB_USERNAME='${{ secrets.DB_USERNAME }}' \
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            OCI_PRIVATE_KEY="${{ secrets.OCI_PRIVATE_KEY }}" \
            sudo -E docker-compose up -d
